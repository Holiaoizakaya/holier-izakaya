<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">鶴料新版書法標誌</title>
  <desc id="desc">以鶴料原書法字為基礎設計的方形日式居酒屋徽章 Logo。</desc>
  <defs>
    <clipPath id="badgeClip">
      <rect x="20" y="20" width="280" height="280" rx="34"/>
    </clipPath>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="2" seed="8"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="320" height="320" fill="#16110e"/>
  <g clip-path="url(#badgeClip)">
    <rect x="20" y="20" width="280" height="280" fill="#fff3d4"/>
    <rect x="20" y="20" width="280" height="280" fill="#fff3d4" filter="url(#paper)"/>
    <path d="M39 71c53-27 95-39 151-24 40 11 67 8 98-12v48c-45 15-79 12-121 0-43-12-83-2-128 22z" fill="#d8271f"/>
    <path d="M34 242c54 26 98 35 154 18 38-11 70-7 98 12v35H34z" fill="#1f1814"/>
    <rect x="44" y="44" width="232" height="232" rx="18" fill="#fffaf0"/>
    <image href="S__162119684.jpg" x="59" y="38" width="202" height="270" preserveAspectRatio="xMidYMid meet"/>
    <circle cx="243" cy="238" r="34" fill="#d8271f"/>
    <text x="243" y="247" text-anchor="middle" font-family="serif" font-size="34" font-weight="900" fill="#fff3d4">鶴</text>
    <path d="M50 49h220v220H50z" fill="none" stroke="#15110d" stroke-width="6"/>
  </g>
  <rect x="20" y="20" width="280" height="280" rx="34" fill="none" stroke="#f6bc42" stroke-width="10"/>
  <rect x="29" y="29" width="262" height="262" rx="26" fill="none" stroke="#15110d" stroke-width="5"/>
</svg>
